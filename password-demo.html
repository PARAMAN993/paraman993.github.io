<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Hashing Demo</title>
    <style>
        body { font-family: Arial; background: #0f172a; color: #e2e8f0; padding: 40px; }
        input, button { padding: 12px; margin: 10px 0; width: 300px; }
    </style>
</head>
<body>
    <h1>Password Hashing Demo</h1>
    <p><a href="index.html">← Back to Home</a></p>

    <input type="password" id="password" placeholder="Enter password">
    <button onclick="hashPassword()">Hash Password</button>
    <pre id="result"></pre>

    <script>
        async function hashPassword() {
            const password = document.getElementById('password').value;
            if (!password) return alert("Enter a password");

            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            document.getElementById('result').textContent = 
                `Hashed Password (SHA-256):\n${hashHex}\n\nNever store plain passwords!`;
        }
    </script>
</body>
</html>
