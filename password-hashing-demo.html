<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Hashing Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100 p-8">

  <div class="max-w-2xl mx-auto">
    <h1 class="text-4xl font-bold mb-8 text-emerald-400">🔐 Password Hashing Demo</h1>
    <p class="text-zinc-400 mb-8">Learn how real applications store passwords securely (Never store plain text!)</p>

    <div class="bg-zinc-900 p-8 rounded-2xl border border-zinc-700">
      <input 
        type="password" 
        id="passwordInput"
        placeholder="Enter a password"
        class="w-full p-4 bg-zinc-800 border border-zinc-700 rounded-xl text-lg focus:outline-none focus:border-emerald-500">
      
      <button 
        onclick="hashPassword()"
        class="mt-6 w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-xl font-semibold text-lg transition">
        Hash Password (SHA-256)
      </button>

      <div id="result" class="mt-8 hidden">
        <p class="text-sm text-zinc-400 mb-2">Hashed Password (Never send this to a real backend like this in production):</p>
        <div id="hashOutput" class="bg-black p-4 rounded-xl font-mono text-emerald-400 break-all text-sm"></div>
      </div>
    </div>

    <div class="mt-12 text-sm text-zinc-500">
      <p><strong>Key Learning:</strong> Real apps use bcrypt, Argon2, or PBKDF2. This demo uses Web Crypto API.</p>
    </div>
  </div>

  <script>
    async function hashPassword() {
      const password = document.getElementById('passwordInput').value;
      if (!password) {
        alert("Please enter a password");
        return;
      }

      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

      const output = document.getElementById('hashOutput');
      output.textContent = hashHex;
      document.getElementById('result').classList.remove('hidden');
    }
  </script>
</body>
</html>
